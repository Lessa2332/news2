<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Кібер-Лисиця 2026</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        canvas { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }

        /* ВІДСТУПИ ДЛЯ КНОПОК: піднімаємо їх вище системної панелі */
        .controls { 
            position: absolute; 
            bottom: 40px; /* Додатковий відступ для Samsung */
            z-index: 10;
        }
        #controls-left { left: 20px; }
        #controls-right { right: 20px; display: flex; gap: 10px; }

        .touch-btn {
            width: 55px; height: 55px; background: rgba(50, 50, 80, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 12px;
            color: #fff; font-size: 1.2rem; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }
        #btn-fire { width: 70px; height: 70px; border-radius: 50%; border-color: #ff003c; color: #ff003c; }
        #btn-jump { width: 65px; border-color: #00f3ff; color: #00f3ff; }

        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        .btn-action-panel { background: #39ff14; color: #000; padding: 15px 30px; font-weight: bold; border-radius: 8px; border: none; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="start-screen" class="overlay-screen">
            <h1>Кібер-Лисиця</h1>
            <button class="btn-action-panel" onclick="startGame()">ГРАТИ</button>
        </div>
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <div id="controls-left" class="controls">
            <div class="touch-btn" id="btn-fire">FIRE</div>
        </div>
        <div id="controls-right" class="controls">
            <div class="touch-btn" id="btn-left">←</div>
            <div class="touch-btn" id="btn-right">→</div>
            <div class="touch-btn" id="btn-jump">JUMP</div>
        </div>
    </div>
    <script>
        // ... тут ваш попередній код скрипта ...
        // Головне: переконайтеся, що ви скопіювали всю функціональність
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            // ... запуск гри ...
        }
    </script>
</body>
</html>
