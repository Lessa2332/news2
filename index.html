<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кібер-Лисиця: Навігатор Даних</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00f3ff;
            --dark-bg: #0a0a0c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Екран меню */
        #start-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #141e16 0%, #0a0a0c 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 20px;
            text-align: center;
            border: 4px solid var(--neon-green);
        }

        h1 {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1.8rem;
            color: var(--neon-green);
            text-shadow: 0 0 8px var(--neon-green);
            margin-bottom: 30px;
            font-weight: bold;
        }

        .description {
            max-width: 500px;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 40px;
            color: #ccc;
        }

        .btn-start {
            background-color: var(--neon-green);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 0 15px var(--neon-green);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn-start:active {
            transform: scale(0.95);
            box-shadow: 0 0 5px var(--neon-green);
        }

        /* Контейнер гри */
        #game-container {
            position: relative;
            width: 800px;
            height: 450px;
            background: #111;
            border: 3px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated; /* Ефект ретро-пікселів */
        }

        /* Мобільне керування */
        #controls {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
        }

        .btn-dir, .btn-action {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            cursor: pointer;
        }
        
        .btn-action {
            background: rgba(57, 255, 20, 0.1);
            border-color: var(--neon-green);
            width: 70px;
            height: 70px;
        }

        .btn-dir:active, .btn-action:active {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Модальне вікно квестів (Географія) */
        #quiz-modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 500px;
            background: #0f1715;
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 25px var(--neon-blue);
            padding: 25px;
            border-radius: 10px;
            z-index: 5;
            text-align: center;
        }

        #quiz-modal h3 {
            color: var(--neon-blue);
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .answer-btn {
            background: #1a2421;
            border: 1px solid #334440;
            color: #fff;
            padding: 12px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 5px;
            text-align: left;
            transition: background 0.2s;
        }

        .answer-btn:hover {
            background: #253530;
            border-color: var(--neon-green);
        }

        #feedback {
            margin-top: 15px;
            font-weight: bold;
            min-height: 20px;
        }

        /* Адаптивність під мобільні екрани */
        @media (max-width: 820px) {
            #game-container {
                width: 100vw;
                height: 56.25vw; /* Пропорція 16:9 */
                max-height: 100vh;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-screen">
            <h1>Кібер-Лисиця</h1>
            <div class="subtitle">Навігатор Даних</div>
            <p class="description">
                Збої в системі стерли географічні карти! Допоможи Кібер-Лисиці зібрати надійні джерела інформації, пройти перевірку знань та відновити геодані планети.
            </p>
            <button class="btn-start" onclick="startGame()">ПОЇХАЛИ</button>
        </div>

        <canvas id="gameCanvas" width="800" height="450"></canvas>

        <div id="quiz-modal">
            <h3 id="question-text">Запитання...</h3>
            <div class="answers-grid" id="answers-container">
                </div>
            <div id="feedback"></div>
        </div>

        <div id="controls">
            <div style="display: flex; gap: 10px;">
                <div class="btn-dir" id="btn-left">←</div>
                <div class="btn-dir" id="btn-right">→</div>
            </div>
            <div class="btn-action" id="btn-jump">СТРИБОК</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Стан гри
        let gameActive = false;
        let isQuizActive = false;
        let currentLevel = 1;
        let score = 0;

        // База запитань з географії (6 клас: Джерела географічної інформації)
        const quizDatabase = [
            {
                question: "РІВЕНЬ 1: Яке джерело знань про Землю вважається НАЙДАВНІШИМ серед перелічених?",
                answers: ["Космічні знімки", "Географічні карти та описи", "Електронні 3D-атласи", "GPS-навігатори"],
                correct: 1
            },
            {
                question: "РІВЕНЬ 2: Яка модель Землі найкраще передає її форму без спотворень кутів та площ?",
                answers: ["Топографічний план", "Фізична карта півкуль", "Глобус", "Аерофотознімок"],
                correct: 2
            },
            {
                question: "РІВЕНЬ 3: До якого типу джерел інформації належать сучасні метеорологічні супутники?",
                answers: ["Аерокосмічні джерела", "Картографічні джерела", "Давні писемні описи", "Статистичні довідники"],
                correct: 0
            }
        ];

        // Параметри гравця (Кібер-Лисиці)
        const player = {
            x: 50,
            y: 300,
            width: 40,
            height: 60,
            speed: 5,
            velX: 0,
            velY: 0,
            jumping: false,
            grounded: false
        };

        // Фізичні константи
        const gravity = 0.6;
        const friction = 0.8;

        // Структура платформ (Рівень)
        const platforms = [
            { x: 0, y: 400, width: 800, height: 50 },     // Земля
            { x: 250, y: 280, width: 120, height: 15 },   // Платформа 1
            { x: 450, y: 200, width: 150, height: 15 },   // Платформа 2
            { x: 650, y: 130, width: 100, height: 15 }    // Фінальна платформа
        ];

        // Предмет для збору (Джерело геоданих)
        const targetItem = {
            x: 680,
            y: 80,
            size: 25,
            collected: false,
            pulse: 0
        };

        // Керування клавіатурою
        const keys = {};
        document.body.addEventListener("keydown", function (e) { keys[e.code] = true; });
        document.body.addEventListener("keyup", function (e) { keys[e.code] = false; });

        // Обробка тач-кнопок для мобільних
        setupMobileControls();

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
            resetLevel();
            gameLoop();
        }

        function resetLevel() {
            player.x = 50;
            player.y = 300;
            player.velX = 0;
            player.velY = 0;
            targetItem.collected = false;
            isQuizActive = false;
            document.getElementById('quiz-modal').style.display = 'none';
        }

        // Головний ігровий цикл
        function gameLoop() {
            if (!gameActive) return;

            if (!isQuizActive) {
                updatePhysics();
            }
            render();

            requestAnimationFrame(gameLoop);
        }

        function updatePhysics() {
            // Рух вліво/вправо
            if (keys["ArrowRight"] || keys["KeyD"]) {
                if (player.velX < player.speed) player.velX++;
            }
            if (keys["ArrowLeft"] || keys["KeyA"]) {
                if (player.velX > -player.speed) player.velX--;
            }

            // Стрибок
            if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && !player.jumping && player.grounded) {
                player.jumping = true;
                player.grounded = false;
                player.velY = -12;
            }

            // Застосування тертя та гравітації
            player.velX *= friction;
            player.velY += gravity;

            player.grounded = false;

            // Перевірка зіткнень з платформами
            for (let i = 0; i < platforms.length; i++) {
                let plat = platforms[i];
                let dir = checkCollision(player, plat);

                if (dir === "l" || dir === "r") {
                    player.velX = 0;
                    player.jumping = false;
                } else if (dir === "b") {
                    player.grounded = true;
                    player.jumping = false;
                } else if (dir === "t") {
                    player.velY = player.velY * -0.5;
                }
            }

            // Оновлення позиції
            if (player.grounded) {
                player.velY = 0;
            }

            player.x += player.velX;
            player.y += player.velY;

            // Обмеження екрану
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

            // Перевірка збору предмета
            if (!targetItem.collected && 
                player.x < targetItem.x + targetItem.size &&
                player.x + player.width > targetItem.x &&
                player.y < targetItem.y + targetItem.size &&
                player.y + player.height > targetItem.y) {
                
                targetItem.collected = true;
                triggerQuiz();
            }
        }

        // Метод визначення колізій (AABB)
        function checkCollision(shapeA, shapeB) {
            let vX = (shapeA.x + (shapeA.width / 2)) - (shapeB.x + (shapeB.width / 2)),
                vY = (shapeA.y + (shapeA.height / 2)) - (shapeB.y + (shapeB.height / 2)),
                hWidths = (shapeA.width / 2) + (shapeB.width / 2),
                hHeights = (shapeA.height / 2) + (shapeB.height / 2),
                colDir = null;

            if (Math.abs(vX) < hWidths && Math.abs(vY) < hHeights) {
                let oX = hWidths - Math.abs(vX), oY = hHeights - Math.abs(vY);
                if (oX >= oY) {
                    if (vY > 0) {
                        colDir = "t"; shapeA.y += oY;
                    } else {
                        colDir = "b"; shapeA.y -= oY;
                    }
                } else {
                    if (vX > 0) {
                        colDir = "l"; shapeA.x += oX;
                    } else {
                        colDir = "r"; shapeA.x -= oX;
                    }
                }
            }
            return colDir;
        }

        // Активація поп-апу із запитанням
        function triggerQuiz() {
            isQuizActive = true;
            const modal = document.getElementById('quiz-modal');
            const questionText = document.getElementById('question-text');
            const container = document.getElementById('answers-container');
            const feedback = document.getElementById('feedback');
            
            feedback.innerHTML = "";
            container.innerHTML = "";
            
            // Завантаження поточного запитання відповідно до рівня
            const currentQuest = quizDatabase[(currentLevel - 1) % quizDatabase.length];
            questionText.innerText = currentQuest.question;

            currentQuest.answers.forEach((ans, index) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.innerText = `${index + 1}. ${ans}`;
                btn.onclick = () => checkAnswer(index, currentQuest.correct);
                container.appendChild(btn);
            });

            modal.style.display = 'block';
        }

        function checkAnswer(selected, correct) {
            const feedback = document.getElementById('feedback');
            if (selected === correct) {
                feedback.style.color = varName('--neon-green', '#39ff14');
                feedback.innerText = "ДОСТУП ДОЗВОЛЕНО! Дані відновлено.";
                score += 100;
                
                setTimeout(() => {
                    currentLevel++;
                    resetLevel();
                }, 1500);
            } else {
                feedback.style.color = "#ff0055";
                feedback.innerText = "ПОМИЛКА СИСТЕМИ. Спробуй ще раз аналізувати джерело!";
            }
        }

        function varName(name, fallback) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || fallback;
        }

        // Візуалізація об'єктів
        function render() {
            // Очищення сцени
            ctx.fillStyle = '#0a0a0c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Малюємо кібер-сітку (бекграунд)
            ctx.strokeStyle = '#141917';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let j=0; j<canvas.height; j+=40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
            }

            // HUD (Рахунок та рівень)
            ctx.fillStyle = '#00f3ff';
            ctx.font = 'bold 14px "Courier New"';
            ctx.fillText(`РАЙОН ДАНИХ: ${currentLevel}`, 20, 30);
            ctx.fillText(`СИНХРОНІЗАЦІЯ: ${score} XP`, 630, 30);

            // Платформи
            ctx.fillStyle = '#1b2c24';
            ctx.strokeStyle = '#39ff14';
            ctx.lineWidth = 2;
            platforms.forEach(plat => {
                ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
            });

            // Предмет для збору (Неоновий інфо-кристалик / Джерело)
            if (!targetItem.collected) {
                targetItem.pulse += 0.1;
                let sizeOffset = Math.sin(targetItem.pulse) * 3;
                ctx.fillStyle = '#00f3ff';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00f3ff';
                ctx.fillRect(targetItem.x - sizeOffset/2, targetItem.y - sizeOffset/2, targetItem.size + sizeOffset, targetItem.size + sizeOffset);
                ctx.shadowBlur = 0; // Скидання тіні
                
                // Мітка над предметом
                ctx.fillStyle = '#fff';
                ctx.font = '10px monospace';
                ctx.fillText("ГЕО-ДЖЕРЕЛО", targetItem.x - 20, targetItem.y - 10);
            }

            // ТИМЧАСОВИЙ СПРАЙТ ЛИСИЧКИ (Поки немає завантаженого PNG)
            // Робимо стилізацію під помаранчеву ретро-лисицю в окулярах
            ctx.fillStyle = '#e67e22'; // Тіло лисиці
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            ctx.fillStyle = '#fadbd8'; // Мордочка/грудка
            ctx.fillRect(player.x + 10, player.y + 10, player.width - 20, 20);

            ctx.fillStyle = '#00f3ff'; // Сині кібер-окуляри
            ctx.fillRect(player.x + 5, player.y + 12, player.width - 10, 8);
            
            // Вушка
            ctx.fillStyle = '#d35400';
            ctx.beginPath();
            ctx.moveTo(player.x, player.y); ctx.lineTo(player.x + 12, player.y - 12); ctx.lineTo(player.x + 15, player.y); ctx.fill();
            ctx.moveTo(player.x + player.width, player.y); ctx.lineTo(player.x + player.width - 12, player.y - 12); ctx.lineTo(player.x + player.width - 15, player.y); ctx.fill();
        }

        // Логіка тач-панелі для мобільних пристроїв
        function setupMobileControls() {
            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');
            const btnJump = document.getElementById('btn-jump');

            btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); keys["ArrowLeft"] = true; });
            btnLeft.addEventListener('touchend', () => { keys["ArrowLeft"] = false; });
            
            btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); keys["ArrowRight"] = true; });
            btnRight.addEventListener('touchend', () => { keys["ArrowRight"] = false; });

            btnJump.addEventListener('touchstart', (e) => { e.preventDefault(); keys["Space"] = true; });
            btnJump.addEventListener('touchend', () => { keys["Space"] = false; });
        }
    </script>
</body>
</html>
