<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Кібер-Лисиця: Навігатор Даних</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00f3ff;
            --neon-red: #ff003c;
            --dark-bg: #060608;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }

        html, body {
            position: fixed; width: 100%; height: 100%; overflow: hidden;
            background-color: var(--dark-bg); color: #fff; font-family: 'Courier New', Courier, monospace;
            display: flex; align-items: center; justify-content: center; touch-action: none;
        }

        #game-container {
            position: relative; width: 95vw; height: 53.43vw; max-width: 800px; max-height: 450px;
            background: #0f0f14; border: 3px solid #222; box-shadow: 0 0 30px rgba(0,0,0,0.9); overflow: hidden;
        }

        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }

        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #101815 0%, #060608 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; padding: 20px; text-align: center; border: 4px solid var(--neon-green);
        }

        h1 { font-size: 2.2rem; text-shadow: 0 0 10px var(--neon-blue); margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { font-size: 1.4rem; color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); margin-bottom: 20px; font-weight: bold; }
        .description { max-width: 500px; font-size: 0.9rem; line-height: 1.4; margin-bottom: 25px; color: #aaa; }
        
        .btn-action-panel {
            background-color: var(--neon-green); color: #000; border: none; padding: 15px 40px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 6px; box-shadow: 0 0 15px var(--neon-green);
        }

        /* Мобільне керування (FIRE зліва, Стрілки та Стрибок справа) */
        #controls-left { position: absolute; bottom: 15px; left: 20px; z-index: 5;}
        #controls-right { position: absolute; bottom: 15px; right: 20px; display: flex; gap: 10px; z-index: 5;}

        .touch-btn {
            width: 60px; height: 60px; background: rgba(15, 15, 25, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 12px;
            color: #fff; font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; justify-content: center; pointer-events: auto;
        }

        #btn-fire {
            width: 85px; height: 85px; border-radius: 50%;
            background: rgba(57, 255, 20, 0.15); border-color: var(--neon-green);
            color: var(--neon-green); font-size: 1.2rem; box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
        }

        #btn-jump { background: rgba(0, 243, 255, 0.15); border-color: var(--neon-blue); color: var(--neon-blue); width: 75px; font-size: 1rem; }

        /* Поп-ап квесту */
        #quiz-modal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 550px; background: #0b0f19; border: 3px solid var(--neon-blue);
            box-shadow: 0 0 30px var(--neon-blue); padding: 20px; border-radius: 8px; z-index: 15; text-align: center;
        }

        #question-text { color: #fff; font-size: 1rem; margin-bottom: 15px; line-height: 1.4; }
        .answers-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .answer-btn {
            background: #141a29; border: 1px solid #2d3954; color: #fff; padding: 12px;
            font-family: inherit; font-size: 0.9rem; cursor: pointer; border-radius: 4px; text-align: left;
        }
        .answer-btn:active { background: #1e2942; border-color: var(--neon-green); }
        #feedback { margin-top: 12px; font-weight: bold; font-size: 0.9rem; min-height: 18px; }

        @media (max-width: 820px) {
            h1 { font-size: 1.6rem; } .subtitle { font-size: 1.1rem; }
            .touch-btn { width: 50px; height: 50px; font-size: 1.2rem; }
            #btn-fire { width: 70px; height: 70px; font-size: 1rem; }
            #btn-jump { width: 65px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-screen" class="overlay-screen">
            <h1>Кібер-Лисиця</h1>
            <div class="subtitle">Навігатор Даних</div>
            <p class="description">Увага! Системні віруси захопили географічні бази даних. Використовуй постріли, щоб розчистити шлях, збери всі джерела та віднови знання!</p>
            <button class="btn-action-panel" onclick="startGame()">ПОЇХАЛИ</button>
        </div>

        <div id="victory-screen" class="overlay-screen" style="display: none; border-color: var(--neon-blue);">
            <h1>СИСТЕМУ ВІДНОВЛЕНО!</h1>
            <div class="subtitle" style="color: var(--neon-blue);">МАГІСТР ГЕОДАНІВ</div>
            <p class="description">Вітаємо! Ти успішно знищив віруси та відновив усі географічні карти.</p>
            <button class="btn-action-panel" style="background-color: var(--neon-blue);" onclick="restartGame()">ЗАНОВО</button>
        </div>

        <canvas id="gameCanvas" width="800" height="450"></canvas>

        <div id="quiz-modal">
            <h3 id="question-text"></h3>
            <div class="answers-grid" id="answers-container"></div>
            <div id="feedback"></div>
        </div>

        <div id="controls-left">
            <div class="touch-btn" id="btn-fire">FIRE</div>
        </div>
        <div id="controls-right">
            <div class="touch-btn" id="btn-left">←</div>
            <div class="touch-btn" id="btn-right">→</div>
            <div class="touch-btn" id="btn-jump">СТРИБ</div>
        </div>
    </div>

    <script>
        // ================= AUDIO СИНТЕЗАТОР =================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'shoot') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'jump') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.15);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'win') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime); // A4
                osc.frequency.setValueAtTime(554, audioCtx.currentTime + 0.1); // C#5
                osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.2); // E5
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        // ================= ІГРОВИЙ РУШІЙ =================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameActive = false; let isQuizActive = false;
        let currentLevel = 1; let score = 0;
        let screenFlash = 0; // Для ефекту отримання шкоди

        const levelsConfig = [
            {
                name: "РАЙОН 1: ПАПЕРОВІ ДЖЕРЕЛА", gridColor: "#112415", platStroke: "#39ff14", targetLabel: "АТЛАС",
                platforms: [ {x: 0, y: 400, width: 800, height: 50}, {x: 200, y: 300, width: 200, height: 15}, {x: 500, y: 220, width: 160, height: 15} ],
                enemies: [ {x: 250, y: 270, width: 24, height: 30, speed: 1.5, dir: 1, pIdx: 1} ],
                target: { x: 550, y: 170 },
                question: "Що з переліченого є класичним друкованим джерелом географічних знань?",
                answers: ["Супутниковий трекер", "Географічний атлас", "3D модель рельєфу", "Радіолокатор"], correct: 1
            },
            {
                name: "РАЙОН 2: ОБ'ЄМНІ МОДЕЛІ", gridColor: "#0b1f24", platStroke: "#00f3ff", targetLabel: "ГЛОБУС",
                platforms: [ {x: 0, y: 400, width: 800, height: 50}, {x: 120, y: 320, width: 150, height: 15}, {x: 350, y: 240, width: 150, height: 15}, {x: 600, y: 160, width: 100, height: 15} ],
                enemies: [ {x: 400, y: 210, width: 24, height: 30, speed: 2, dir: -1, pIdx: 2}, {x: 600, y: 370, width: 24, height: 30, speed: 1, dir: 1, pIdx: 0} ],
                target: { x: 620, y: 110 },
                question: "Яка тривимірна модель Землі найкраще відображає її форму без спотворень?",
                answers: ["Контурна карта", "Глобус", "Настінна карта", "План евакуації"], correct: 1
            },
            {
                name: "РАЙОН 3: НАВІГАЦІЯ", gridColor: "#240b20", platStroke: "#ff007f", targetLabel: "КОМПАС",
                platforms: [ {x: 0, y: 400, width: 800, height: 50}, {x: 200, y: 290, width: 150, height: 15}, {x: 400, y: 190, width: 150, height: 15} ],
                enemies: [ {x: 420, y: 160, width: 24, height: 30, speed: 2.5, dir: 1, pIdx: 2} ],
                target: { x: 450, y: 140 },
                question: "Який традиційний прилад використовують для визначення азимуту?",
                answers: ["Барометр", "Компас", "Гідрометр", "Телескоп"], correct: 1
            },
            {
                name: "РАЙОН 4: КОСМОС", gridColor: "#24200b", platStroke: "#ffff00", targetLabel: "СУПУТНИК",
                platforms: [ {x: 0, y: 400, width: 800, height: 50}, {x: 300, y: 330, width: 200, height: 15}, {x: 100, y: 250, width: 120, height: 15}, {x: 550, y: 200, width: 150, height: 15} ],
                enemies: [ {x: 350, y: 300, width: 24, height: 30, speed: 1.5, dir: 1, pIdx: 1}, {x: 580, y: 170, width: 24, height: 30, speed: 2, dir: -1, pIdx: 3} ],
                target: { x: 120, y: 200 },
                question: "Які джерела отримують з орбітальних апаратів?",
                answers: ["Описи істориків", "Космічні знімки", "Глибоководне буріння", "Опитування"], correct: 1
            },
            {
                name: "РАЙОН 5: ГІС", gridColor: "#1d0b24", platStroke: "#b000ff", targetLabel: "БАЗА ГІС",
                platforms: [ {x: 0, y: 400, width: 800, height: 50}, {x: 100, y: 320, width: 100, height: 15}, {x: 280, y: 250, width: 100, height: 15}, {x: 460, y: 180, width: 100, height: 15}, {x: 640, y: 110, width: 100, height: 15} ],
                enemies: [ {x: 300, y: 220, width: 24, height: 30, speed: 3, dir: 1, pIdx: 2}, {x: 480, y: 150, width: 24, height: 30, speed: 3, dir: -1, pIdx: 3} ],
                target: { x: 670, y: 60 },
                question: "Як називаються комп'ютерні системи, що об'єднують карти та бази даних?",
                answers: ["Друкарні", "Енциклопедії", "Геоінформаційні системи (ГІС)", "Архіви"], correct: 2
            }
        ];

        // ЗБІЛЬШЕНА ЛИСИЧКА (48x68 замість 36x51)
        const player = {
            x: 50, y: 300, width: 48, height: 68, speed: 5.5, velX: 0, velY: 0,
            jumping: false, grounded: false, facingRight: true, hp: 100, maxHp: 100, invulnerable: 0
        };

        const gravity = 0.55; const friction = 0.78;
        const keys = { Left: false, Right: false, Jump: false };
        let projectiles = [];
        let activeEnemies = [];

        document.body.addEventListener("keydown", (e) => { handleKey(e.code, true); });
        document.body.addEventListener("keyup", (e) => { handleKey(e.code, false); });

        function handleKey(code, isPressed) {
            if (code === "ArrowRight" || code === "KeyD") keys.Right = isPressed;
            if (code === "ArrowLeft" || code === "KeyA") keys.Left = isPressed;
            if (code === "Space" || code === "ArrowUp" || code === "KeyW") keys.Jump = isPressed;
            if (code === "Enter" || code === "KeyF") { if(isPressed && gameActive) shoot(); }
        }

        setupTouchButton('btn-left', 'Left');
        setupTouchButton('btn-right', 'Right');
        setupTouchButton('btn-jump', 'Jump');
        
        // Кнопка стрільби
        document.getElementById('btn-fire').addEventListener('touchstart', (e) => {
            e.preventDefault(); if(gameActive && !isQuizActive) shoot();
        });
        document.getElementById('btn-fire').addEventListener('mousedown', (e) => {
            e.preventDefault(); if(gameActive && !isQuizActive) shoot();
        });

        function setupTouchButton(id, key) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; }, {passive:false});
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; }, {passive:false});
        }

        function startGame() {
            audioCtx.resume();
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true; currentLevel = 1; score = 0; player.hp = 100;
            loadLevel(); gameLoop();
        }

        function restartGame() {
            document.getElementById('victory-screen').style.display = 'none';
            startGame();
        }

        function loadLevel() {
            player.x = 50; player.y = 300; player.velX = 0; player.velY = 0;
            projectiles = []; isQuizActive = false;
            document.getElementById('quiz-modal').style.display = 'none';
            
            // Клонування ворогів для рівня
            activeEnemies = JSON.parse(JSON.stringify(levelsConfig[currentLevel - 1].enemies));
        }

        function shoot() {
            playSound('shoot');
            projectiles.push({
                x: player.facingRight ? player.x + player.width : player.x,
                y: player.y + player.height / 2,
                speed: player.facingRight ? 12 : -12,
                width: 15, height: 5
            });
        }

        function gameLoop() {
            if (!gameActive) return;
            if (!isQuizActive) updatePhysics();
            render();
            requestAnimationFrame(gameLoop);
        }

        function updatePhysics() {
            const lvl = levelsConfig[currentLevel - 1];

            // Гравець
            if (keys.Right) { if (player.velX < player.speed) player.velX += 0.8; player.facingRight = true; } 
            else if (keys.Left) { if (player.velX > -player.speed) player.velX -= 0.8; player.facingRight = false; } 
            else { player.velX *= friction; }

            if (player.velY < 0 && !keys.Jump) player.velY += gravity * 2.6;
            else if (player.velY > 0) player.velY += gravity * 1.6;
            else player.velY += gravity;

            player.grounded = false;

            for (let i = 0; i < lvl.platforms.length; i++) {
                let dir = checkCollision(player, lvl.platforms[i]);
                if (dir === "l" || dir === "r") player.velX = 0;
                else if (dir === "b") { player.grounded = true; player.jumping = false; }
                else if (dir === "t") player.velY = 0;
            }

            if (player.grounded) player.velY = 0;
            if (keys.Jump && !player.jumping && player.grounded) {
                playSound('jump'); player.jumping = true; player.grounded = false; player.velY = -12;
            }

            player.x += player.velX; player.y += player.velY;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

            // Вороги
            activeEnemies.forEach((enemy, eIdx) => {
                enemy.x += enemy.speed * enemy.dir;
                let plat = lvl.platforms[enemy.pIdx];
                if (enemy.x <= plat.x || enemy.x + enemy.width >= plat.x + plat.width) {
                    enemy.dir *= -1; // Патрулювання
                }

                // Зіткнення гравця з ворогом
                if (player.invulnerable <= 0 && intersectRect(player, enemy)) {
                    playSound('hit');
                    player.hp -= 20;
                    player.invulnerable = 60; // Кадри невразливості
                    player.velY = -5; // Відкидання
                    player.velX = enemy.dir * 5;
                    screenFlash = 10;
                    if (player.hp <= 0) { player.hp = 100; loadLevel(); } // Рестарт рівня
                }
            });

            if (player.invulnerable > 0) player.invulnerable--;
            if (screenFlash > 0) screenFlash--;

            // Постріли
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.x += p.speed;
                if (p.x < 0 || p.x > canvas.width) { projectiles.splice(i, 1); continue; }

                // Влучання у ворога
                for (let j = activeEnemies.length - 1; j >= 0; j--) {
                    if (intersectRect(p, activeEnemies[j])) {
                        playSound('hit');
                        activeEnemies.splice(j, 1);
                        projectiles.splice(i, 1);
                        score += 50;
                        break;
                    }
                }
            }

            // Ціль
            if (intersectRect(player, {
